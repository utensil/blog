engine: nixery

# Freeze-free render test on a branch. Publishes to `site` (operator-requested, so they can
# eyeball it side-by-side with the current frozen output via the live URL).
# Pulls TWO prebuilt assets from R2 (utensil-tngl bucket): the precompiled Julia depot
# (extracted to its exact /nix/store path where its .ji caches reference it) AND the
# render-env closure (julia + nix mesa.drivers/llvmpipe + libGL + X libs + Xvfb +
# env.sh; nix-store --import'd so every store path lands at the names env.sh hardcodes).
# Sourcing env.sh sets the headless-GL recipe + adds julia/Xvfb to PATH — no `nix develop`
# at runtime, so Spindle skips the cold-cache julia-official + nix-shell-env rebuild that
# stretched the render to 20min+.
# Sibling of render.yml (which still triggers on main pushes + also publishes, so a push to
# main can race-overwrite this output on `site`).
when:
  - event: ["push"]
    branch: freeze-free

dependencies:
  nixpkgs:
    - bash
    - coreutils
    - gnugrep
    - git
    - openssh
    - cacert
    - findutils
    - gcc
    - quarto
    - curl
    - gnutar
    - gzip
    - patchelf
    - glibc
    - zstd        # decompress the depot tarball + render-env NAR
    - nix         # `nix-store --import` the render-env closure
    - jq          # parse manifest.json from R2 (discovers asset names + storepaths)

steps:
  - name: render LIVE (cached depot from GH release, no publish)
    command: |
      set -euo pipefail
      export SSL_CERT_FILE="${SSL_CERT_FILE:-${NIX_SSL_CERT_FILE:-/etc/ssl/certs/ca-bundle.crt}}"
      libstdcpp_dir="$(dirname "$(find /nix/store -maxdepth 4 -name 'libstdc++.so.6' 2>/dev/null | head -1)")"
      export LD_LIBRARY_PATH="${libstdcpp_dir}:${LD_LIBRARY_PATH:-}"
      export HOME="${HOME:-/tmp/cihome}"

      echo "::group::pin Hugo 0.125.2 (same as main)"
      HUGO_VER=0.125.2
      curl -fsSL -o /tmp/hugo.tgz \
        "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VER}/hugo_extended_${HUGO_VER}_linux-amd64.tar.gz"
      mkdir -p /tmp/hugobin
      tar -xzf /tmp/hugo.tgz -C /tmp/hugobin hugo
      ldso="$(find /nix/store -maxdepth 3 -name 'ld-linux-x86-64.so.2' 2>/dev/null | head -1)"
      libc_dir="$(dirname "$(find /nix/store -maxdepth 4 -name 'libc.so.6' 2>/dev/null | head -1)")"
      libgcc_dir="$(dirname "$(find /nix/store -maxdepth 4 -name 'libgcc_s.so.1' 2>/dev/null | head -1)")"
      patchelf --set-interpreter "$ldso" \
        --set-rpath "${libstdcpp_dir}:${libgcc_dir}:${libc_dir}" /tmp/hugobin/hugo
      export PATH="/tmp/hugobin:$PATH"
      echo "::endgroup::"

      echo "::group::discover assets via R2 manifest.json"
      R2_PUBLIC_URL=https://pub-5462b73a50594a06b85663123d74ab23.r2.dev
      curl -fsSL "$R2_PUBLIC_URL/manifest.json" -o /tmp/manifest.json
      jq . /tmp/manifest.json
      DEPOT_TAR=$(jq -r '.assets.depot.tar' /tmp/manifest.json)
      DEPOT_PATH=$(jq -r '.assets.depot.store_path' /tmp/manifest.json)
      ENV_NAR=$(jq -r '.assets.render_env.nar' /tmp/manifest.json)
      ENV_PATH=$(jq -r '.assets.render_env.store_path' /tmp/manifest.json)
      echo "::endgroup::"

      echo "::group::fetch + extract depot from R2"
      echo "depot expected at: $DEPOT_PATH"
      if mkdir -p "/nix/store/.write-test-$$" 2>/dev/null; then
        rmdir "/nix/store/.write-test-$$"
        echo "✓ /nix/store is WRITABLE — extracting in place"
        curl -fsSL "$R2_PUBLIC_URL/$DEPOT_TAR" -o /tmp/depot.tar.zst
        zstd -d -T0 /tmp/depot.tar.zst -o /tmp/depot.tar
        tar -C /nix/store -xf /tmp/depot.tar
        rm -f /tmp/depot.tar /tmp/depot.tar.zst
      else
        echo "::error::/nix/store NOT writable in nixery — need nix-store --import / NAR strategy"
        exit 1
      fi
      test -d "$DEPOT_PATH" || { echo "depot dir absent after extract: $DEPOT_PATH"; exit 1; }
      du -sh "$DEPOT_PATH"
      echo "::endgroup::"

      echo "::group::theme submodules"
      git submodule update --init --recursive 2>/dev/null || true
      echo "::endgroup::"

      echo "::group::invalidate ca-in-julia _freeze (force LIVE Julia render)"
      rm -rf _freeze/content/posts/ca-in-julia
      ls _freeze/content/posts/ 2>&1 | head || true
      echo "::endgroup::"

      echo "::group::fetch + import render-env closure (julia + GL + Xvfb)"
      echo "render-env expected at: $ENV_PATH"
      curl -fsSL "$R2_PUBLIC_URL/$ENV_NAR" -o /tmp/env.nar.zst
      zstd -d -T0 /tmp/env.nar.zst -o /tmp/env.nar
      nix-store --import < /tmp/env.nar
      rm -f /tmp/env.nar /tmp/env.nar.zst
      test -f "$ENV_PATH/env.sh" || { echo "::error::env.sh missing under $ENV_PATH"; exit 1; }
      echo "::endgroup::"

      echo "::group::render LIVE via render-env (no nix develop)"
      # env.sh adds the julia + Xvfb bin/ to PATH and exports the GL recipe
      # (LD_LIBRARY_PATH, LIBGL_*, GALLIUM_DRIVER, __GLX_VENDOR_LIBRARY_NAME).
      # No JULIA_PKG_OFFLINE: ensureQuartoNotebookRunnerEnvironment runs Pkg.up
      # internally, which calls check_registered. With Dummy removed from the depot,
      # Pkg installs the real General registry to /tmp/wdepot at runtime.
      source "$ENV_PATH/env.sh"
      export DISPLAY=:73
      rm -f /tmp/.X73-lock /tmp/.X11-unix/X73 2>/dev/null || true
      Xvfb :73 -screen 0 1280x1024x24 +extension GLX +render -noreset >/tmp/xvfb.log 2>&1 &
      sleep 4
      mkdir -p /tmp/wdepot
      export JULIA_DEPOT_PATH="/tmp/wdepot:$DEPOT_PATH"
      julia --version; quarto --version; hugo version
      quarto render .
      hugo --minify
      test -f public/index.html
      echo "::endgroup::"

      echo "::group::verify freshly-rendered ca-in-julia mp4s"
      # Don't hardcode the path — Hugo URL structure isn't pinned here. Just confirm
      # at least two .mp4 land in public/ (streamplot + lorenz), report where.
      echo "--- mp4s under public/ ---"
      find public -name '*.mp4' -printf '%p  %s bytes\n' 2>/dev/null || find public -name '*.mp4' -exec ls -lh {} \;
      echo "--- mp4s in source content (where Julia record() writes) ---"
      find content -name '*.mp4' -newer /tmp/depot.tar.zst -printf '%p  %s bytes\n' 2>/dev/null || true
      n=$(find public -name '*.mp4' 2>/dev/null | wc -l)
      [ "$n" -ge 2 ] || { echo "::error::expected 2+ mp4s in public/, found $n"; exit 1; }
      echo "✓ $n mp4s in public/"
      echo "::endgroup::"

      echo "::group::publish freeze-free render to site branch (operator-requested eyeball)"
      : "${DEPLOY_SSH_KEY_B64:?DEPLOY_SSH_KEY_B64 secret not set}"
      mkdir -p "$HOME/.ssh"; chmod 700 "$HOME/.ssh"
      grep -q ':0:0:' /etc/passwd || echo "root:x:0:0:root:$HOME:/bin/sh" >> /etc/passwd 2>/dev/null || true
      printf '%s' "$DEPLOY_SSH_KEY_B64" | base64 -d > "$HOME/.ssh/deploy"; chmod 600 "$HOME/.ssh/deploy"
      export GIT_SSH_COMMAND="ssh -i $HOME/.ssh/deploy -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=$HOME/.ssh/known_hosts"
      export GIT_AUTHOR_NAME=tangled-ci GIT_AUTHOR_EMAIL=ci@utensil.tngl.sh
      export GIT_COMMITTER_NAME=tangled-ci GIT_COMMITTER_EMAIL=ci@utensil.tngl.sh
      cd public && git init -q && git checkout -q -b site && git add -A
      git commit -q -m "render blog (freeze-free) $(date -u +%Y-%m-%dT%H:%M:%SZ)"
      git push --force "git@tangled.org:utensil.tngl.sh/blog" site
      cd ..
      echo "pushed freeze-free rendered blog → branch site"
      echo "::endgroup::"

      echo "✅ freeze-free render OK + published to site for eyeballing"
