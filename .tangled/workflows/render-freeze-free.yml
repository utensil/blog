engine: nixery

# Freeze-free render test on a branch — does NOT publish to `site` (production untouched).
# Pulls the precompiled Julia depot from the infra-land GH release, places it at its exact
# /nix/store path (where its .ji caches reference it), enters the `blog-render` devShell
# from the infra-land flake (official julia + software-GL stack + Xvfb with the env preset),
# invalidates the ca-in-julia _freeze so quarto re-executes the Julia LIVE through the
# cached depot. Sibling of render.yml (which stays main-only + publishes).
when:
  - event: ["push"]
    branch: freeze-free

dependencies:
  nixpkgs:
    - bash
    - coreutils
    - gnugrep
    - git
    - openssh
    - cacert
    - findutils
    - gcc
    - quarto
    - curl
    - gnutar
    - gzip
    - patchelf
    - glibc
    - zstd        # decompress the depot tarball
    - nix         # `nix develop` the blog-render flake env from infra-land

steps:
  - name: render LIVE (cached depot from GH release, no publish)
    command: |
      set -euo pipefail
      export SSL_CERT_FILE="${SSL_CERT_FILE:-${NIX_SSL_CERT_FILE:-/etc/ssl/certs/ca-bundle.crt}}"
      libstdcpp_dir="$(dirname "$(find /nix/store -maxdepth 4 -name 'libstdc++.so.6' 2>/dev/null | head -1)")"
      export LD_LIBRARY_PATH="${libstdcpp_dir}:${LD_LIBRARY_PATH:-}"
      export HOME="${HOME:-/tmp/cihome}"

      echo "::group::pin Hugo 0.125.2 (same as main)"
      HUGO_VER=0.125.2
      curl -fsSL -o /tmp/hugo.tgz \
        "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VER}/hugo_extended_${HUGO_VER}_linux-amd64.tar.gz"
      mkdir -p /tmp/hugobin
      tar -xzf /tmp/hugo.tgz -C /tmp/hugobin hugo
      ldso="$(find /nix/store -maxdepth 3 -name 'ld-linux-x86-64.so.2' 2>/dev/null | head -1)"
      libc_dir="$(dirname "$(find /nix/store -maxdepth 4 -name 'libc.so.6' 2>/dev/null | head -1)")"
      libgcc_dir="$(dirname "$(find /nix/store -maxdepth 4 -name 'libgcc_s.so.1' 2>/dev/null | head -1)")"
      patchelf --set-interpreter "$ldso" \
        --set-rpath "${libstdcpp_dir}:${libgcc_dir}:${libc_dir}" /tmp/hugobin/hugo
      export PATH="/tmp/hugobin:$PATH"
      echo "::endgroup::"

      echo "::group::fetch cached depot from infra-land release"
      REL=https://github.com/utensil/infra-land/releases/download/blog-depot-x86_64
      curl -fsSL "$REL/blog-depot-x86_64.storepath" -o /tmp/depot.storepath
      DEPOT_PATH="$(cat /tmp/depot.storepath)"
      echo "depot expected at: $DEPOT_PATH"
      # Probe /nix/store writability (the open question we asked).
      if mkdir -p "/nix/store/.write-test-$$" 2>/dev/null; then
        rmdir "/nix/store/.write-test-$$"
        echo "✓ /nix/store is WRITABLE — extracting in place"
        curl -fsSL "$REL/blog-depot-x86_64.tar.zst" -o /tmp/depot.tar.zst
        zstd -d -T0 /tmp/depot.tar.zst -o /tmp/depot.tar
        tar -C /nix/store -xf /tmp/depot.tar
        rm -f /tmp/depot.tar /tmp/depot.tar.zst
      else
        echo "::error::/nix/store NOT writable in nixery — need nix-store --import / NAR strategy"
        exit 1
      fi
      test -d "$DEPOT_PATH" || { echo "depot dir absent after extract: $DEPOT_PATH"; exit 1; }
      du -sh "$DEPOT_PATH"
      echo "::endgroup::"

      echo "::group::theme submodules"
      git submodule update --init --recursive 2>/dev/null || true
      echo "::endgroup::"

      echo "::group::invalidate ca-in-julia _freeze (force LIVE Julia render)"
      rm -rf _freeze/content/posts/ca-in-julia
      ls _freeze/content/posts/ 2>&1 | head || true
      echo "::endgroup::"

      echo "::group::clone infra-land flake locally (sidesteps nix git+https redirect)"
      # tangled.org/<user>/<repo> 302-redirects to knot1.tangled.sh/<did>/<repo>, and
      # nix's git-flake fetcher loses `?dir=nix` through that redirect (`error: path
      # '«git+https://…?ref=refs/heads/…»` — the failure from the first attempt). git
      # itself follows the redirect fine; clone locally then point nix develop at the path.
      rm -rf /tmp/infra-land
      git clone --depth 1 https://tangled.org/utensil.tngl.sh/infra-land /tmp/infra-land
      ls /tmp/infra-land/nix/flake.nix
      echo "::endgroup::"

      echo "::group::render LIVE via blog-render devShell (julia + GL recipe + Xvfb)"
      mkdir -p /tmp/wdepot
      # The devShell sets LD_LIBRARY_PATH / LIBGL_* / GALLIUM_DRIVER / __GLX_VENDOR_LIBRARY_NAME
      # via shellHook; we just add DISPLAY, start Xvfb, point JULIA_DEPOT_PATH at the cached
      # depot, then quarto render runs the Julia LIVE through GLMakie.
      nix --extra-experimental-features 'nix-command flakes' develop \
        "/tmp/infra-land/nix#blog-render" \
        -c bash -c '
          set -e
          export DISPLAY=:73
          rm -f /tmp/.X73-lock /tmp/.X11-unix/X73 2>/dev/null || true
          Xvfb :73 -screen 0 1280x1024x24 +extension GLX +render -noreset >/tmp/xvfb.log 2>&1 &
          sleep 4
          export JULIA_DEPOT_PATH="/tmp/wdepot:'"$DEPOT_PATH"'"
          export JULIA_PKG_OFFLINE=true
          julia --version; quarto --version; hugo version
          quarto render .
          hugo --minify
        '
      test -f public/index.html
      echo "::endgroup::"

      echo "::group::verify freshly-rendered ca-in-julia mp4s"
      ls -lh public/content/posts/ca-in-julia/*.mp4 2>/dev/null \
        || { echo "::error::no fresh mp4s in public/content/posts/ca-in-julia/"; exit 1; }
      echo "::endgroup::"

      echo "✅ freeze-free render OK — branch CI does NOT publish (production untouched)"
