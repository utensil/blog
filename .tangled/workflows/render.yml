engine: nixery

# Build the blog (Hugo + Quarto) on tangled's Spindle and publish to the `site`
# branch → utensil.tngl.sh/blog. TOOLCHAIN-FREE: it reuses the committed
# `_freeze/` (execute.freeze: auto) AND the committed generated artifacts
# (Julia mp4s, typst .pdf/.artifact.svg, d2/pikchr .svg), so there is no Julia,
# typst, d2 or pikchr here — just Quarto + a pinned Hugo. Refresh those with
# scripts/freeze.sh (locally) or the freeze.yml GitHub workflow.
#
# Hugo is PINNED to 0.125.2 (the version the blog is built + tested with on
# GitHub Pages) instead of nixpkgs' current Hugo: newer Hugo removed echoParam /
# getJSON and made partial lookups strict, which breaks the pinned PaperMod and
# hugo-cite themes. Pinning keeps tangled byte-for-byte in lockstep with GitHub.
when:
  - event: ["push"]
    branch: main

dependencies:
  nixpkgs:
    - bash
    - coreutils
    - gnugrep
    - git
    - openssh
    - cacert
    - findutils
    - gcc
    - quarto
    # for fetching + relinking the pinned Hugo release binary on NixOS:
    - curl
    - gnutar
    - gzip
    - patchelf
    - glibc

steps:
  - name: build and publish blog
    command: |
      set -euo pipefail
      export SSL_CERT_FILE="${SSL_CERT_FILE:-${NIX_SSL_CERT_FILE:-/etc/ssl/certs/ca-bundle.crt}}"
      libstdcpp_dir="$(dirname "$(find /nix/store -maxdepth 4 -name 'libstdc++.so.6' 2>/dev/null | head -1)")"
      export LD_LIBRARY_PATH="${libstdcpp_dir}:${LD_LIBRARY_PATH:-}"
      export HOME="${HOME:-/tmp/cihome}"

      echo "::group::pin Hugo 0.125.2 (extended), relink for NixOS"
      # The official release binary is a foreign glibc ELF; this nixery image has
      # no /lib64 dynamic linker, so patchelf its interpreter + rpath to the
      # nix-store glibc/gcc libs.
      HUGO_VER=0.125.2
      curl -fsSL -o /tmp/hugo.tgz \
        "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VER}/hugo_extended_${HUGO_VER}_linux-amd64.tar.gz"
      mkdir -p /tmp/hugobin
      tar -xzf /tmp/hugo.tgz -C /tmp/hugobin hugo
      ldso="$(find /nix/store -maxdepth 3 -name 'ld-linux-x86-64.so.2' 2>/dev/null | head -1)"
      libc_dir="$(dirname "$(find /nix/store -maxdepth 4 -name 'libc.so.6' 2>/dev/null | head -1)")"
      libgcc_dir="$(dirname "$(find /nix/store -maxdepth 4 -name 'libgcc_s.so.1' 2>/dev/null | head -1)")"
      patchelf --set-interpreter "$ldso" \
        --set-rpath "${libstdcpp_dir}:${libgcc_dir}:${libc_dir}" /tmp/hugobin/hugo
      export PATH="/tmp/hugobin:$PATH"
      echo "::endgroup::"

      echo "::group::versions + theme submodules"
      quarto --version; hugo version
      # PaperMod + hugo-cite are git submodules; ensure they're present for hugo.
      git submodule update --init --recursive 2>/dev/null || true
      echo "::endgroup::"

      echo "::group::render (reuse committed _freeze/ + committed artifacts) + hugo"
      quarto render .
      hugo --minify
      test -f public/index.html
      echo "::endgroup::"

      echo "::group::publish"
      : "${DEPLOY_SSH_KEY_B64:?DEPLOY_SSH_KEY_B64 secret not set}"
      mkdir -p "$HOME/.ssh"; chmod 700 "$HOME/.ssh"
      grep -q ':0:0:' /etc/passwd || echo "root:x:0:0:root:$HOME:/bin/sh" >> /etc/passwd 2>/dev/null || true
      printf '%s' "$DEPLOY_SSH_KEY_B64" | base64 -d > "$HOME/.ssh/deploy"; chmod 600 "$HOME/.ssh/deploy"
      export GIT_SSH_COMMAND="ssh -i $HOME/.ssh/deploy -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=$HOME/.ssh/known_hosts"
      export GIT_AUTHOR_NAME=tangled-ci GIT_AUTHOR_EMAIL=ci@utensil.tngl.sh
      export GIT_COMMITTER_NAME=tangled-ci GIT_COMMITTER_EMAIL=ci@utensil.tngl.sh
      cd public && git init -q && git checkout -q -b site && git add -A
      git commit -q -m "render blog $(date -u +%Y-%m-%dT%H:%M:%SZ)"
      git push --force "git@tangled.org:utensil.tngl.sh/blog" site
      echo "pushed rendered blog → branch 'site'"
      echo "::endgroup::"
