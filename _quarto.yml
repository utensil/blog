project:
  type: hugo
  # output-dir: ../dummy
      
format: 
  hugo-md:
    code-fold: true
  
execute:
  warning: false
  # `freeze: auto` only short-circuits local re-renders when sources are
  # unchanged. Both CI lanes (gh-pages.yml on GH Actions, render.yml on tangled
  # Spindle) execute Julia LIVE — neither relies on a committed `_freeze/`.
  freeze: auto

